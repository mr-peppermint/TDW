<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theta Division — Dixit</title>
  <meta name="theme-color" content="#04040A" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       GLOBALS — Design tokens & reset
       ============================================================ */
    :root {
      --td-obsidian:     #04040A;
      --td-void:         #080812;
      --td-surface:      #0D0D1A;
      --td-panel:        #12122A;
      --td-border:       #1E1E3F;
      --td-border-light: #2A2A55;

      --td-violet:       #5227FF;
      --td-violet-dim:   #3A1CB8;
      --td-violet-glow:  rgba(82, 39, 255, 0.25);
      --td-rose:         #FF9FFC;
      --td-rose-dim:     #C97FC6;

      --td-green:        #00FF88;
      --td-green-dim:    #00C968;
      --td-green-glow:   rgba(0, 255, 136, 0.35);

      --td-white:        #F0EFF8;
      --td-white-muted:  #9896B8;
      --td-white-dim:    #5A5880;

      --font-display:  'Syne', sans-serif;
      --font-body:     'Space Grotesk', sans-serif;
      --font-mono:     'JetBrains Mono', monospace;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--td-obsidian);
      color: var(--td-white);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       APP LAYOUT
       ============================================================ */
    .app {
      position: relative;
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: var(--td-obsidian);
    }

    .app__pillar-layer {
      position: absolute; inset: 0; z-index: 0;
    }

    .app__vignette {
      position: absolute; inset: 0; z-index: 5;
      pointer-events: none;
      background: radial-gradient(
        ellipse 80% 80% at 50% 50%,
        transparent 30%,
        rgba(4, 4, 10, 0.55) 70%,
        rgba(4, 4, 10, 0.88) 100%
      );
    }

    .app__scanline {
      position: absolute; inset: 0; z-index: 6;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 3px,
        rgba(82, 39, 255, 0.012) 3px,
        rgba(82, 39, 255, 0.012) 4px
      );
    }

    /* ============================================================
       LIGHT PILLAR canvas wrapper
       ============================================================ */
    .light-pillar-container {
      width: 100%; height: 100%;
      position: absolute; inset: 0;
    }

    /* ============================================================
       HEX GRID
       ============================================================ */
    .hexgrid {
      position: absolute; inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .hexgrid__svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    .hexgrid__cell {
      fill: none;
      stroke: var(--td-border);
      stroke-width: 0.5;
      opacity: 0;
      animation: hex-fade-in 1.2s var(--ease-out) forwards;
    }

    .hexgrid__cell--accent {
      stroke: var(--td-violet);
      stroke-width: 0.8;
      opacity: 0;
      animation: hex-accent 4.5s ease-in-out infinite;
    }

    @keyframes hex-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes hex-accent {
      0%, 100% { opacity: 0;    stroke: var(--td-violet); }
      40%       { opacity: 0.55; stroke: var(--td-rose);   }
      60%       { opacity: 0.35; stroke: var(--td-violet); }
    }

    /* Hero hexagon */
    .hexgrid__hero-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      z-index: 2;
    }

    .hexgrid__hero-svg {
      width: 300px; height: 300px;
      animation: hero-spin 14s linear infinite;
      filter:
        drop-shadow(0 0 20px rgba(82, 39, 255, 0.55))
        drop-shadow(0 0 48px rgba(255, 159, 252, 0.18));
    }

    .hexgrid__hero-outer {
      fill: none; stroke: var(--td-violet); stroke-width: 1; opacity: 0.65;
    }

    .hexgrid__hero-mid {
      fill: none; stroke: var(--td-rose); stroke-width: 0.6; opacity: 0.35;
      animation: hero-contra 9s linear infinite;
      transform-origin: 150px 150px;
    }

    .hexgrid__hero-inner {
      fill: rgba(82, 39, 255, 0.04);
      stroke: var(--td-border-light); stroke-width: 0.5; opacity: 0.5;
    }

    .hexgrid__hero-tick {
      fill: none; stroke: var(--td-violet); stroke-width: 0.8; opacity: 0.45;
    }

    @keyframes hero-spin   { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
    @keyframes hero-contra { from { transform: rotate(0deg); }   to { transform: rotate(-360deg); } }

    /* ============================================================
       NAVBAR
       ============================================================ */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 30px 52px;
      pointer-events: none;
    }

    .navbar__brand {
      pointer-events: auto;
      display: flex; align-items: center; gap: 10px;
    }

    .navbar__brand-theta {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 800;
      color: var(--td-violet);
      line-height: 1;
      text-shadow: 0 0 18px var(--td-violet-glow);
    }

    .navbar__brand-divider {
      width: 1px; height: 14px;
      background: var(--td-border-light); opacity: 0.6;
    }

    .navbar__brand-text {
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--td-white);
      opacity: 0.9;
      user-select: none;
    }

    .navbar__status {
      pointer-events: auto;
      display: flex; align-items: center; gap: 10px;
    }

    .navbar__status-label {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--td-white-muted);
    }

    /* ============================================================
       STATUS INDICATOR
       ============================================================ */
    .status-indicator {
      display: inline-flex; align-items: center;
      justify-content: center;
      position: relative; flex-shrink: 0;
    }

    .status-indicator__dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--td-green);
      box-shadow: 0 0 8px 2px var(--td-green-glow);
      position: relative; z-index: 1;
    }

    .status-indicator__ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: var(--td-green);
      animation: status-pulse 2.4s ease-out infinite;
    }

    @keyframes status-pulse {
      0%   { transform: scale(1);   opacity: 0.7; }
      70%  { transform: scale(2.6); opacity: 0; }
      100% { transform: scale(2.6); opacity: 0; }
    }

    /* ============================================================
       CENTER HERO
       ============================================================ */
    .center-hero {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10; pointer-events: none;
    }

    .center-hero__eyebrow {
      font-family: var(--font-mono);
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.40em;
      text-transform: uppercase;
      color: var(--td-white-dim);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0;
      animation: hero-rise 0.8s 0.5s var(--ease-out) forwards;
    }

    .center-hero__eyebrow::before,
    .center-hero__eyebrow::after {
      content: '';
      display: block; width: 32px; height: 1px;
      background: var(--td-border-light);
    }

    .center-hero__name {
      font-family: var(--font-display);
      font-size: clamp(60px, 9vw, 104px);
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      line-height: 1;
      text-align: center;
      background: linear-gradient(
        135deg,
        var(--td-white) 20%,
        var(--td-rose)  52%,
        var(--td-violet) 78%,
        var(--td-white) 100%
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 40px rgba(82,39,255,0.6)) drop-shadow(0 0 80px rgba(255,159,252,0.2));
      opacity: 0;
      animation:
        hero-rise 1s 0.7s var(--ease-out) forwards,
        name-shimmer 6s 2.5s ease-in-out infinite;
    }

    .center-hero__sub {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 300;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--td-white-muted);
      margin-top: 22px;
      opacity: 0;
      animation: hero-rise 0.8s 1.0s var(--ease-out) forwards;
    }

    /* Reticle corners */
    .center-hero__corner {
      position: absolute;
      width: 18px; height: 18px;
      opacity: 0;
      animation: hero-rise 0.6s 1.2s var(--ease-out) forwards;
    }
    .center-hero__corner--tl {
      top: calc(50% - 70px); left: calc(50% - 200px);
      border-top: 1px solid var(--td-border-light);
      border-left: 1px solid var(--td-border-light);
    }
    .center-hero__corner--tr {
      top: calc(50% - 70px); right: calc(50% - 200px);
      border-top: 1px solid var(--td-border-light);
      border-right: 1px solid var(--td-border-light);
    }
    .center-hero__corner--bl {
      bottom: calc(50% - 70px); left: calc(50% - 200px);
      border-bottom: 1px solid var(--td-border-light);
      border-left: 1px solid var(--td-border-light);
    }
    .center-hero__corner--br {
      bottom: calc(50% - 70px); right: calc(50% - 200px);
      border-bottom: 1px solid var(--td-border-light);
      border-right: 1px solid var(--td-border-light);
    }

    @keyframes hero-rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes name-shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ============================================================
       PROCEED BUTTON
       ============================================================ */
    .proceed-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 48px 38px;
      background: linear-gradient(
        to top,
        rgba(4, 4, 10, 0.96) 0%,
        rgba(4, 4, 10, 0.55) 60%,
        transparent 100%
      );
      opacity: 0;
      animation: proceed-enter 0.8s 1.6s var(--ease-out) forwards;
    }

    .proceed-btn {
      position: relative;
      display: inline-flex; align-items: center; gap: 14px;
      padding: 14px 40px;
      background: transparent;
      border: 1px solid var(--td-violet);
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      color: var(--td-white);
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      transition:
        color 0.25s var(--ease-out),
        border-color 0.25s var(--ease-out),
        box-shadow 0.35s var(--ease-out);
      overflow: hidden;
    }

    .proceed-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--td-violet-dim), var(--td-violet));
      transform: translateX(-101%);
      transition: transform 0.35s var(--ease-out);
      z-index: 0;
    }

    .proceed-btn:hover::before,
    .proceed-btn:focus-visible::before { transform: translateX(0); }

    .proceed-btn:hover,
    .proceed-btn:focus-visible {
      border-color: var(--td-rose);
      box-shadow:
        0 0 28px rgba(82, 39, 255, 0.5),
        0 0 64px rgba(82, 39, 255, 0.18);
      outline: none;
    }

    .proceed-btn__text,
    .proceed-btn__arrow { position: relative; z-index: 1; }

    .proceed-btn__arrow {
      font-size: 14px; opacity: 0.65;
      transition: transform 0.25s var(--ease-out), opacity 0.25s;
    }

    .proceed-btn:hover .proceed-btn__arrow,
    .proceed-btn:focus-visible .proceed-btn__arrow {
      transform: translateX(5px); opacity: 1;
    }

    .proceed-btn__corner {
      position: absolute;
      width: 6px; height: 6px;
    }
    .proceed-btn__corner--tl {
      top: -1px; left: -1px;
      border-top: 1px solid var(--td-rose);
      border-left: 1px solid var(--td-rose);
    }
    .proceed-btn__corner--br {
      bottom: -1px; right: -1px;
      border-bottom: 1px solid var(--td-rose);
      border-right: 1px solid var(--td-rose);
    }

    @keyframes proceed-enter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .navbar { padding: 20px 24px; }
      .navbar__status-label { display: none; }
      .center-hero__corner { display: none; }
      .proceed-bar { padding: 18px 24px 30px; }
      .proceed-btn { padding: 12px 28px; font-size: 11px; }
    }
  </style>
</head>

<!-- Three.js via CDN for LightPillar -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ============================================================
   HexGrid — SVG background + hero hex
   ============================================================ */
(function buildHexGrid() {
  const NS = 'http://www.w3.org/2000/svg';
  const vW = 1440, vH = 900, r = 38;

  function hexPoints(cx, cy, r) {
    return Array.from({ length: 6 }, (_, i) => {
      const a = Math.PI / 180 * (60 * i - 30);
      return `${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`;
    }).join(' ');
  }

  function hexPath(cx, cy, r) {
    return Array.from({ length: 6 }, (_, i) => {
      const a = Math.PI / 180 * (60 * i - 30);
      return `${i === 0 ? 'M' : 'L'}${(cx + r * Math.cos(a)).toFixed(2)},${(cy + r * Math.sin(a)).toFixed(2)}`;
    }).join(' ') + ' Z';
  }

  /* Background hex grid */
  const bgDiv = document.createElement('div');
  bgDiv.className = 'hexgrid';
  bgDiv.setAttribute('aria-hidden', 'true');

  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('class', 'hexgrid__svg');
  svg.setAttribute('viewBox', `0 0 ${vW} ${vH}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');

  const w = r * 2, h = Math.sqrt(3) * r;
  const cols = Math.ceil(vW / (w * 0.75)) + 2;
  const rows = Math.ceil(vH / h) + 2;
  let idx = 0;

  for (let row = -1; row < rows; row++) {
    for (let col = -1; col < cols; col++) {
      const cx = col * w * 0.75;
      const cy = row * h + (col % 2 === 0 ? 0 : h / 2);
      const accent = Math.random() < 0.035;
      const poly = document.createElementNS(NS, 'polygon');
      poly.setAttribute('points', hexPoints(cx, cy, r - 1));
      poly.setAttribute('class', accent ? 'hexgrid__cell hexgrid__cell--accent' : 'hexgrid__cell');
      const delay = accent
        ? `${(idx % 8) * 0.7}s`
        : `${idx * 0.007}s`;
      poly.style.animationDelay = delay;
      svg.appendChild(poly);
      idx++;
    }
  }

  bgDiv.appendChild(svg);
  document.getElementById('app').insertBefore(bgDiv, document.querySelector('.app__vignette'));

  /* Hero hex (rotating) */
  const heroWrap = document.createElement('div');
  heroWrap.className = 'hexgrid__hero-wrap';
  heroWrap.setAttribute('aria-hidden', 'true');

  const heroSvg = document.createElementNS(NS, 'svg');
  heroSvg.setAttribute('class', 'hexgrid__hero-svg');
  heroSvg.setAttribute('viewBox', '0 0 300 300');

  const outer = document.createElementNS(NS, 'path');
  outer.setAttribute('d', hexPath(150, 150, 128));
  outer.setAttribute('class', 'hexgrid__hero-outer');

  const mid = document.createElementNS(NS, 'path');
  mid.setAttribute('d', hexPath(150, 150, 100));
  mid.setAttribute('class', 'hexgrid__hero-mid');

  const inner = document.createElementNS(NS, 'path');
  inner.setAttribute('d', hexPath(150, 150, 70));
  inner.setAttribute('class', 'hexgrid__hero-inner');

  heroSvg.appendChild(outer);
  heroSvg.appendChild(mid);
  heroSvg.appendChild(inner);

  // Tick marks
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 180 * (60 * i);
    const tick = document.createElementNS(NS, 'line');
    tick.setAttribute('x1', (150 + 128 * Math.cos(a)).toFixed(2));
    tick.setAttribute('y1', (150 + 128 * Math.sin(a)).toFixed(2));
    tick.setAttribute('x2', (150 + 114 * Math.cos(a)).toFixed(2));
    tick.setAttribute('y2', (150 + 114 * Math.sin(a)).toFixed(2));
    tick.setAttribute('class', 'hexgrid__hero-tick');
    heroSvg.appendChild(tick);
  }

  heroWrap.appendChild(heroSvg);
  document.getElementById('app').insertBefore(heroWrap, document.querySelector('.app__vignette'));
})();


/* ============================================================
   LightPillar — Three.js WebGL shader
   ============================================================ */
(function initLightPillar() {
  const container = document.getElementById('pillar-layer');
  if (!container || typeof THREE === 'undefined') return;

  const width  = container.clientWidth  || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  let renderer;
  try {
    renderer = new THREE.WebGLRenderer({
      antialias: false, alpha: true,
      powerPreference: 'high-performance',
      stencil: false, depth: false
    });
  } catch (e) { return; }

  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  const scene  = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  function parseColor(hex) {
    const c = new THREE.Color(hex);
    return new THREE.Vector3(c.r, c.g, c.b);
  }

  const vertexShader = `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
  `;

  const fragmentShader = `
    precision highp float;
    uniform float uTime;
    uniform vec2  uResolution;
    uniform vec3  uTopColor;
    uniform vec3  uBottomColor;
    uniform float uIntensity;
    uniform float uGlowAmount;
    uniform float uPillarWidth;
    uniform float uPillarHeight;
    uniform float uNoiseIntensity;
    uniform float uRotCos;
    uniform float uRotSin;
    uniform float uWaveSin;
    uniform float uWaveCos;
    varying vec2  vUv;

    const int MAX_ITER  = 80;
    const int WAVE_ITER = 4;
    const float STEP_MULT = 1.0;

    void main() {
      vec2 uv = (vUv * 2.0 - 1.0) * vec2(uResolution.x / uResolution.y, 1.0);
      vec3 ro = vec3(0.0, 0.0, -10.0);
      vec3 rd = normalize(vec3(uv, 1.0));
      vec3 col = vec3(0.0);
      float t = 0.1;

      for (int i = 0; i < MAX_ITER; i++) {
        vec3 p = ro + rd * t;
        p.xz = vec2(uRotCos * p.x - uRotSin * p.z, uRotSin * p.x + uRotCos * p.z);
        vec3 q = p;
        q.y = p.y * uPillarHeight + uTime;
        float freq = 1.0, amp = 1.0;
        for (int j = 0; j < WAVE_ITER; j++) {
          q.xz = vec2(uWaveCos * q.x - uWaveSin * q.z, uWaveSin * q.x + uWaveCos * q.z);
          q += cos(q.zxy * freq - uTime * float(j) * 2.0) * amp;
          freq *= 2.0; amp *= 0.5;
        }
        float d = length(cos(q.xz)) - 0.2;
        float bound = length(p.xz) - uPillarWidth;
        float k = 4.0, h = max(k - abs(d - bound), 0.0);
        d = max(d, bound) + h * h * 0.0625 / k;
        d = abs(d) * 0.15 + 0.01;
        float grad = clamp((15.0 - p.y) / 30.0, 0.0, 1.0);
        col += mix(uBottomColor, uTopColor, grad) / d;
        t += d * STEP_MULT;
        if (t > 50.0) break;
      }

      float widthNorm = uPillarWidth / 3.0;
      col = tanh(col * uGlowAmount / widthNorm);
      col -= fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) / 15.0 * uNoiseIntensity;
      gl_FragColor = vec4(col * uIntensity, 1.0);
    }
  `;

  const material = new THREE.ShaderMaterial({
    vertexShader, fragmentShader,
    uniforms: {
      uTime:          { value: 0 },
      uResolution:    { value: new THREE.Vector2(width, height) },
      uTopColor:      { value: parseColor('#5227FF') },
      uBottomColor:   { value: parseColor('#FF9FFC') },
      uIntensity:     { value: 1.0 },
      uGlowAmount:    { value: 0.005 },
      uPillarWidth:   { value: 3.0 },
      uPillarHeight:  { value: 0.4 },
      uNoiseIntensity:{ value: 0.4 },
      uRotCos:        { value: 1.0 },
      uRotSin:        { value: 0.0 },
      uWaveSin:       { value: Math.sin(0.4) },
      uWaveCos:       { value: Math.cos(0.4) },
    },
    transparent: true, depthWrite: false, depthTest: false
  });

  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

  let timeVal = 0, last = performance.now();
  const frameTime = 1000 / 60;

  function animate(now) {
    requestAnimationFrame(animate);
    const dt = now - last;
    if (dt >= frameTime) {
      timeVal += 0.016 * 0.25;
      material.uniforms.uTime.value    = timeVal;
      material.uniforms.uRotCos.value  = Math.cos(timeVal * 0.3);
      material.uniforms.uRotSin.value  = Math.sin(timeVal * 0.3);
      renderer.render(scene, camera);
      last = now - (dt % frameTime);
    }
  }
  requestAnimationFrame(animate);

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const w = container.clientWidth, h = container.clientHeight;
      renderer.setSize(w, h);
      material.uniforms.uResolution.value.set(w, h);
    }, 150);
  }, { passive: true });
})();
</script>
